name: Cypress E2E + BDD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  cypress-e2e:
    name: Cypress POM suite
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run POM-driven Cypress spec
        uses: cypress-io/github-action@v7
        with:
          install: false
          browser: electron
          spec: cypress/e2e/project.cy.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-e2e
          path: cypress/screenshots
          if-no-files-found: ignore

  cypress-bdd:
    name: Cypress BDD (Cucumber) suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run BDD feature files
        uses: cypress-io/github-action@v7
        with:
          install: false
          browser: electron
          spec: cypress/e2e/features/**/*.feature

      - name: Upload Cucumber JSON report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cucumber-report
          path: cypress/cucumber-report.json
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-bdd
          path: cypress/screenshots
          if-no-files-found: ignore
